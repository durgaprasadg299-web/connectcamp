<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Campus Connect Lite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #0a0e27, #1a1f3a, #2d1b4e, #1e3a5f);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        /* Particle System */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Enhanced Auth Container */
        .auth-container {
            animation: fadeIn 0.8s ease-out;
        }

        .auth-box {
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .auth-box h2 {
            animation: slideInRight 0.6s ease-out 0.3s backwards;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            animation: slideInRight 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.4s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.5s;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.6s;
        }

        .form-group:nth-child(4) {
            animation-delay: 0.7s;
        }

        .form-control {
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .btn {
            animation: slideInRight 0.6s ease-out 0.8s backwards;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            animation: slideInRight 0.6s ease-out 0.3s backwards;
        }

        .alert-success {
            background-color: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .alert-error {
            background-color: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }

        .alert-warning {
            background-color: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ff9800;
        }

        .password-strength {
            margin-top: 8px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        .strength-weak {
            background-color: #f44336;
            width: 33%;
        }

        .strength-medium {
            background-color: #ff9800;
            width: 66%;
        }

        .strength-strong {
            background-color: #4caf50;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- Particle Background -->
    <div class="particles-container" id="particles"></div>

    <header>
        <div class="container">
            <nav>
                <div class="logo"><a href="index.html" style="text-decoration:none; color:var(--primary-color)">Campus
                        Connect Lite</a></div>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <div class="glass-card auth-box">
            <h2 style="margin-bottom: 10px;">Reset Password</h2>
            <p style="font-size: 0.9em; color: var(--text-muted); margin-bottom: 15px;">Create a new password for your account.</p>

            <div id="messageContainer"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your registered email" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter new password" required>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <small id="strengthText" style="color: var(--text-muted);">Password strength: Very Weak</small>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;" id="submitBtn">Reset Password</button>
            </form>

            <p style="margin-top: 15px; color: var(--text-muted); text-align: center;">
                <a href="login.html" style="color: var(--primary-color);">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Generate Particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;

                container.appendChild(particle);
            }
        }

        createParticles();

        // Get token and email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        const emailParam = urlParams.get('email');
        const messageContainer = document.getElementById('messageContainer');

        // Verify token on page load
        if (!resetToken || !emailParam) {
            messageContainer.innerHTML = `
                <div class="alert alert-error">
                    âœ— Invalid reset link. Missing token or email.
                </div>
            `;
            document.getElementById('resetPasswordForm').style.display = 'none';
        } else {
            document.getElementById('email').value = emailParam;

            // Verify token with server
            (async () => {
                try {
                    const response = await fetchAPI('/auth/verify-reset-token', 'POST', {
                        token: resetToken,
                        email: emailParam
                    });
                } catch (error) {
                    messageContainer.innerHTML = `
                        <div class="alert alert-error">
                            âœ— ${error.message || 'Invalid or expired reset link'}
                        </div>
                    `;
                    document.getElementById('resetPasswordForm').style.display = 'none';
                }
            })();
        }

        // Password Strength Meter
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            let strength = 0;
            if (password.length >= 6) strength += 1;
            if (password.length >= 10) strength += 1;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;

            strengthBar.className = 'password-strength-bar';

            if (strength <= 1) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Password strength: Very Weak';
            } else if (strength <= 3) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Password strength: Medium';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Password strength: Strong';
            }
        });

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                messageContainer.innerHTML = `
                    <div class="alert alert-error">
                        âœ— Passwords do not match
                    </div>
                `;
                return;
            }

            if (password.length < 6) {
                messageContainer.innerHTML = `
                    <div class="alert alert-error">
                        âœ— Password must be at least 6 characters long
                    </div>
                `;
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Resetting...';

                const data = await fetchAPI('/auth/reset-password', 'POST', {
                    token: resetToken,
                    email,
                    password,
                    confirmPassword
                });

                messageContainer.innerHTML = `
                    <div class="alert alert-success">
                        âœ“ <strong>Password reset successfully!</strong><br>
                        <small>Your password has been updated. Redirecting to login...</small>
                    </div>
                `;

                document.getElementById('resetPasswordForm').style.display = 'none';
                document.querySelector('.auth-box p').style.display = 'none';

                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                messageContainer.innerHTML = `
                    <div class="alert alert-error">
                        âœ— ${error.message || 'Error resetting password'}
                    </div>
                `;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
