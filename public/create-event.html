<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - Campus Connect Lite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .slot-selection-container {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .time-slot {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .time-slot.available {
            background: rgba(46, 204, 113, 0.1);
            border-color: #2ecc71;
        }

        .time-slot.available:hover {
            background: rgba(46, 204, 113, 0.2);
            transform: translateY(-2px);
        }

        .time-slot.locked {
            background: rgba(231, 76, 60, 0.1);
            border-color: #e74c3c;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .time-slot.selected {
            background: rgba(243, 156, 18, 0.2);
            border-color: #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
        }

        .time-slot .time {
            font-weight: 600;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .time-slot .badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .badge.green {
            background: #2ecc71;
            color: white;
        }

        .badge.red {
            background: #e74c3c;
            color: white;
        }

        .badge.yellow {
            background: #f39c12;
            color: white;
        }

        .selected-range {
            margin-top: 20px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(52, 152, 219, 0.3);
            text-align: center;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            position: relative;
        }

        .step.active {
            color: #3498db;
            font-weight: 600;
        }

        .step.completed {
            color: #2ecc71;
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">Create Event</div>
                <div class="nav-links">
                    <a href="dashboard-club.html" class="btn btn-outline">Back to Dashboard</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container" style="padding: 40px 20px;">
        <div class="glass-card" style="max-width: 900px; margin: 0 auto;">
            <h2 style="margin-bottom: 30px;">Create New Event</h2>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step active" id="step1">1. Venue Type</div>
                <div class="step" id="step2">2. Select Venue</div>
                <div class="step" id="step3">3. Choose Date</div>
                <div class="step" id="step4">4. Pick Time Slot</div>
                <div class="step" id="step5">5. Event Details</div>
            </div>

            <div id="errorAlert"
                style="display:none; background: #fee; color: #c00; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fcc;">
            </div>

            <form id="createEventForm">
                <!-- Step 1: Venue Type -->
                <div class="form-section" id="venueTypeSection">
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Select Venue Type</label>
                        <select id="venueType" class="form-control" required disabled>
                            <option value="">Loading venue types...</option>
                        </select>
                    </div>
                </div>

                <!-- Step 2: Specific Venue -->
                <div class="form-section" id="venueSelectSection" style="display:none;">
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Select Specific Venue</label>
                        <select id="venueId" class="form-control" required disabled>
                            <option value="">-- Choose Venue --</option>
                        </select>
                        <div id="venueLoading" style="display:none; margin-top:10px;">
                            <span class="loading-spinner"></span> Loading venues...
                        </div>
                    </div>
                </div>

                <!-- Step 3: Date -->
                <div class="form-section" id="dateSection" style="display:none;">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Event Date</label>
                        <input type="date" id="eventDate" class="form-control" required style="cursor: pointer;">
                    </div>
                </div>

                <!-- Step 4: Time Slots -->
                <div class="form-section" id="slotSection" style="display:none;">
                    <div class="slot-selection-container">
                        <h4><i class="fas fa-clock"></i> Available Time Slots</h4>
                        <p class="hint">Click to select start time, then click again to select end time</p>
                        <div id="slotsLoading" style="display:none; text-align:center; padding:20px;">
                            <span class="loading-spinner"></span> Loading available slots...
                        </div>
                        <div class="slot-grid" id="slotGrid"></div>
                        <div class="selected-range" id="selectedRange" style="display:none;">
                            <strong>Selected Time:</strong>
                            <span id="selectedStart">--</span> to <span id="selectedEnd">--</span>
                        </div>
                    </div>
                </div>

                <!-- Step 5: Event Details -->
                <div class="form-section" id="detailsSection" style="display:none;">
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Event Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Description</label>
                        <textarea id="description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Category</label>
                        <select id="category" class="form-control" required>
                            <option value="General">General</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Hackathon">Hackathon</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Sports">Sports</option>
                            <option value="Seminar">Seminar</option>
                            <option value="Technical">Technical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-users"></i> Capacity</label>
                        <input type="number" id="capacity" class="form-control" value="100" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> Event Poster (Optional)</label>
                        <input type="file" id="poster" class="form-control" accept="image/*">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">
                        <i class="fas fa-check-circle"></i> Create Event
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'club') {
            window.location.href = 'login.html';
        }

        let selectedVenueId = null;
        let selectedDate = null;
        let selectedStartTime = null;
        let selectedEndTime = null;
        let selectedSlots = [];

        // Step 1: Venue Type Selection
        document.getElementById('venueType').addEventListener('change', async (e) => {
            const type = e.target.value;
            if (!type) return;

            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('active');
            document.getElementById('venueSelectSection').style.display = 'block';
            document.getElementById('venueLoading').style.display = 'block';

            selectedVenueId = null;
            const venueSelect = document.getElementById('venueId');
            venueSelect.disabled = true;
            venueSelect.innerHTML = '<option value="">-- Choose Venue --</option>';

            try {
                const venues = await fetchAPI(`/venues/by-type/${encodeURIComponent(type)}`, 'GET', null, getToken());

                if (venues.length === 0) {
                    venueSelect.innerHTML = '<option value="">No venues available for this type</option>';
                    return;
                }

                venues.forEach(venue => {
                    const option = document.createElement('option');
                    option.value = venue._id;
                    option.textContent = `${venue.name} (${venue.location}) - Capacity: ${venue.capacity}`;
                    venueSelect.appendChild(option);
                });

                venueSelect.disabled = false;
                venueSelect.value = '';
            } catch (error) {
                showError('Failed to load venues');
                venueSelect.innerHTML = '<option value="">Error loading venues</option>';
            } finally {
                document.getElementById('venueLoading').style.display = 'none';
            }
        });

        // Step 2: Venue Selection
        document.getElementById('venueId').addEventListener('change', (e) => {
            selectedVenueId = e.target.value;
            if (!selectedVenueId) return;

            document.getElementById('step2').classList.add('completed');
            document.getElementById('step3').classList.add('active');
            document.getElementById('dateSection').style.display = 'block';

            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('eventDate').setAttribute('min', today);
        });

        // Step 3: Date Selection
        const eventDateInput = document.getElementById('eventDate');
        let lastValidDate = '';

        eventDateInput.addEventListener('input', (e) => {
            // Allow input only from the calendar picker, reject manual typing
            if (e.inputType && e.inputType !== 'insertFromPicker') {
                e.target.value = lastValidDate;
                return;
            }
            lastValidDate = e.target.value;
        });

        eventDateInput.addEventListener('paste', (e) => {
            e.preventDefault();
        });

        eventDateInput.addEventListener('change', async (e) => {
            selectedDate = e.target.value;
            lastValidDate = selectedDate;
            if (!selectedDate) return;

            document.getElementById('step3').classList.add('completed');
            document.getElementById('step4').classList.add('active');
            document.getElementById('slotSection').style.display = 'block';
            document.getElementById('slotsLoading').style.display = 'block';

            await loadAvailableSlots();
        });

        async function loadAvailableSlots() {
            try {
                const slots = await fetchAPI(`/venues/${selectedVenueId}/slots/${selectedDate}`, 'GET', null, getToken());
                const slotGrid = document.getElementById('slotGrid');
                slotGrid.innerHTML = '';

                slots.forEach(slot => {
                    const slotDiv = document.createElement('div');
                    slotDiv.className = `time-slot ${slot.available ? 'available' : 'locked'}`;
                    slotDiv.dataset.time = slot.startTime;
                    slotDiv.dataset.endTime = slot.endTime;

                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'time';
                    timeSpan.textContent = formatTime(slot.startTime);

                    const badge = document.createElement('span');
                    badge.className = `badge ${slot.available ? 'green' : 'red'}`;
                    badge.textContent = slot.available ? 'Available' : 'Booked';

                    slotDiv.appendChild(timeSpan);
                    slotDiv.appendChild(badge);

                    if (slot.available) {
                        slotDiv.addEventListener('click', () => selectSlot(slotDiv, slot));
                    }

                    slotGrid.appendChild(slotDiv);
                });
            } catch (error) {
                showError('Failed to load time slots');
            } finally {
                document.getElementById('slotsLoading').style.display = 'none';
            }
        }

        function selectSlot(element, slot) {
            if (!selectedStartTime) {
                // First click - select start time
                selectedStartTime = slot.startTime;
                element.classList.add('selected');
                selectedSlots.push(element);

                document.getElementById('selectedRange').style.display = 'block';
                document.getElementById('selectedStart').textContent = formatTime(selectedStartTime);
                document.getElementById('selectedEnd').textContent = '(select end time)';
            } else if (!selectedEndTime) {
                // Second click - select end time
                const startHour = parseInt(selectedStartTime.split(':')[0]);
                const endHour = parseInt(slot.startTime.split(':')[0]);

                if (endHour <= startHour) {
                    showError('End time must be after start time');
                    return;
                }

                selectedEndTime = slot.startTime;
                element.classList.add('selected');
                selectedSlots.push(element);

                document.getElementById('selectedEnd').textContent = formatTime(selectedEndTime);

                // Show event details form
                document.getElementById('step4').classList.add('completed');
                document.getElementById('step5').classList.add('active');
                document.getElementById('detailsSection').style.display = 'block';
                document.getElementById('detailsSection').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function formatTime(time24) {
            const [hours, minutes] = time24.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minutes} ${ampm}`;
        }

        async function loadVenueTypes() {
            const venueTypeSelect = document.getElementById('venueType');
            venueTypeSelect.disabled = true;
            venueTypeSelect.innerHTML = '<option value="">Loading venue types...</option>';

            try {
                const types = await fetchAPI('/venues/types', 'GET', null, getToken());

                if (!types || types.length === 0) {
                    venueTypeSelect.innerHTML = '<option value="">No venue types available</option>';
                    return;
                }

                venueTypeSelect.innerHTML = '<option value="">-- Choose Venue Type --</option>';
                types.forEach(typeItem => {
                    const option = document.createElement('option');
                    option.value = typeItem.type;
                    option.textContent = `${typeItem.type} (${typeItem.count})`;
                    venueTypeSelect.appendChild(option);
                });
                venueTypeSelect.disabled = false;
            } catch (error) {
                venueTypeSelect.innerHTML = '<option value="">Unable to load venue types</option>';
                console.error('Failed to load venue types', error);
            }
        }

        loadVenueTypes();

        // Form Submission
        document.getElementById('createEventForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedVenueId || !selectedDate || !selectedStartTime || !selectedEndTime) {
                showError('Please complete all steps before creating the event');
                return;
            }

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('date', selectedDate);
            formData.append('time', selectedStartTime);
            formData.append('endTime', selectedEndTime);
            formData.append('venueId', selectedVenueId);
            formData.append('capacity', document.getElementById('capacity').value);
            formData.append('category', document.getElementById('category').value);

            const posterFile = document.getElementById('poster').files[0];
            if (posterFile) {
                formData.append('poster', posterFile);
            }

            try {
                const result = await fetch('https://connectcamp-backend.onrender.com/api/events', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: formData
                });

                const data = await result.json();

                if (data.success) {
                    alert('Event created successfully!');
                    window.location.href = 'dashboard-club.html';
                } else {
                    showError(data.message || 'Failed to create event');
                }
            } catch (error) {
                console.error(error);
                showError('An error occurred while creating the event');
            }
        });

        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            errorAlert.scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        }
    </script>
</body>

</html>
