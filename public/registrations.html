<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registrations - Campus Connect Lite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .registrations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .registration-card {
            position: relative;
            overflow: hidden;
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.green {
            background: #2ecc71;
            color: #2ecc71;
        }

        .status-indicator.red {
            background: #e74c3c;
            color: #e74c3c;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        .capacity-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .capacity-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%);
            transition: width 0.3s ease, background 0.3s ease;
            border-radius: 10px;
        }

        .capacity-fill.full {
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
        }

        .capacity-fill.almost-full {
            background: linear-gradient(90deg, #f39c12 0%, #e67e22 100%);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .event-status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .event-status-badge.open {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.5);
        }

        .event-status-badge.full {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.5);
        }

        .event-status-badge.upcoming {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.5);
        }
    </style>
</head>

<body>
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <h2>Campus Connect</h2>
            <p id="sidebarRole">Club Panel</p>
        </div>

        <nav class="sidebar-nav">
            <ul class="sidebar-menu" id="sidebarMenu">
                <!-- Menu items will be populated by JavaScript based on role -->
            </ul>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <header>
        <div class="container-fluid">
            <nav>
                <div class="logo">Event Registrations</div>
                <div class="nav-links" style="display:flex; align-items:center;">
                    <div class="user-badge">
                        <div class="user-avatar-small" id="headerAvatar">U</div>
                        <span class="user-name-text" id="userName">User</span>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="container main-content-with-sidebar" style="padding: 40px 20px;">
        <h2>Event Registrations Overview</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Track registration status and capacity for all events
        </p>

        <div id="loading" style="text-align: center; margin-top: 50px;">Loading registrations...</div>
        <div id="registrationsGrid" class="registrations-grid">
            <!-- Registrations will be loaded here -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        // Setup user info
        document.getElementById('userName').textContent = user.name;
        document.getElementById('headerAvatar').textContent = user.name.charAt(0).toUpperCase();

        // Setup sidebar based on role
        setupSidebar();

        function setupSidebar() {
            const roleText = document.getElementById('sidebarRole');
            const menu = document.getElementById('sidebarMenu');

            if (user.role === 'student') {
                roleText.textContent = 'Student Portal';
                menu.innerHTML = `
                    <li><a href="dashboard-student.html"><span class="sidebar-menu-icon"><i class="fas fa-home"></i></span><span class="sidebar-menu-text">Dashboard</span></a></li>
                    <li><a href="dashboard-student.html"><span class="sidebar-menu-icon"><i class="fas fa-calendar-alt"></i></span><span class="sidebar-menu-text">Browse Events</span></a></li>
                    <li><a href="#" onclick="showMyRegistrations(); return false;"><span class="sidebar-menu-icon"><i class="fas fa-ticket-alt"></i></span><span class="sidebar-menu-text">My Registrations</span></a></li>
                    <li><a href="verify-ticket.html"><span class="sidebar-menu-icon"><i class="fas fa-qrcode"></i></span><span class="sidebar-menu-text">Verify Ticket</span></a></li>
                    <li><a href="#" onclick="alert('Certificates coming soon!'); return false;"><span class="sidebar-menu-icon"><i class="fas fa-certificate"></i></span><span class="sidebar-menu-text">Certificates</span></a></li>
                `;
            } else if (user.role === 'club') {
                roleText.textContent = 'Club Panel';
                menu.innerHTML = `
                    <li><a href="dashboard-club.html"><span class="sidebar-menu-icon"><i class="fas fa-home"></i></span><span class="sidebar-menu-text">Dashboard</span></a></li>
                    <li><a href="dashboard-club.html"><span class="sidebar-menu-icon"><i class="fas fa-calendar-check"></i></span><span class="sidebar-menu-text">My Events</span></a></li>
                    <li><a href="create-event.html"><span class="sidebar-menu-icon"><i class="fas fa-plus-circle"></i></span><span class="sidebar-menu-text">Create Event</span></a></li>
                    <li><a href="registrations.html" class="active"><span class="sidebar-menu-icon"><i class="fas fa-users"></i></span><span class="sidebar-menu-text">Registrations</span></a></li>
                    <li><a href="ai-analyzer.html"><span class="sidebar-menu-icon"><i class="fas fa-robot"></i></span><span class="sidebar-menu-text">AI Analyzer</span></a></li>
                    <li><a href="planner.html"><span class="sidebar-menu-icon"><i class="fas fa-draw-polygon"></i></span><span class="sidebar-menu-text">2D Planner</span></a></li>
                `;
            } else if (user.role === 'admin') {
                roleText.textContent = 'Admin Panel';
                menu.innerHTML = `
                    <li><a href="dashboard-admin.html"><span class="sidebar-menu-icon"><i class="fas fa-home"></i></span><span class="sidebar-menu-text">Dashboard</span></a></li>
                    <li><a href="dashboard-admin.html"><span class="sidebar-menu-icon"><i class="fas fa-users-cog"></i></span><span class="sidebar-menu-text">User Management</span></a></li>
                    <li><a href="dashboard-admin.html"><span class="sidebar-menu-icon"><i class="fas fa-building"></i></span><span class="sidebar-menu-text">Venue Management</span></a></li>
                    <li><a href="registrations.html" class="active"><span class="sidebar-menu-icon"><i class="fas fa-users"></i></span><span class="sidebar-menu-text">All Registrations</span></a></li>
                `;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }

        async function loadRegistrations() {
            try {
                const events = await fetchAPI('/events', 'GET', null, getToken());

                // Filter events based on role
                let filteredEvents = events;
                if (user.role === 'club') {
                    filteredEvents = events.filter(e => e.organizer._id === user._id);
                }

                // Get registration counts for each event
                const eventsWithRegistrations = await Promise.all(
                    filteredEvents.map(async (event) => {
                        try {
                            const registrations = await fetchAPI(`/events/${event._id}/attendees`, 'GET', null, getToken());
                            return {
                                ...event,
                                registrationCount: registrations.length,
                                registrations: registrations
                            };
                        } catch (error) {
                            // If not authorized or error, set count to 0
                            return {
                                ...event,
                                registrationCount: 0,
                                registrations: []
                            };
                        }
                    })
                );

                renderRegistrations(eventsWithRegistrations);
            } catch (error) {
                document.getElementById('loading').textContent = 'Error loading registrations.';
                console.error(error);
            }
        }

        function getEventStatus(event) {
            const now = new Date();
            const eventDate = new Date(event.date);
            const capacity = event.capacity || 100;
            const registered = event.registrationCount || 0;
            const percentFull = (registered / capacity) * 100;

            // Event is full
            if (registered >= capacity) {
                return { status: 'full', color: 'red', label: 'FULL' };
            }

            // Event hasn't started yet (upcoming)
            if (eventDate > now) {
                return { status: 'upcoming', color: 'green', label: 'OPEN' };
            }

            // Event is ongoing or past (green until end)
            return { status: 'open', color: 'green', label: 'ACTIVE' };
        }

        function renderRegistrations(events) {
            const grid = document.getElementById('registrationsGrid');
            document.getElementById('loading').style.display = 'none';

            if (!events || events.length === 0) {
                grid.innerHTML = '<p>No events found.</p>';
                return;
            }

            grid.innerHTML = events.map(event => {
                const capacity = event.capacity || 100;
                const registered = event.registrationCount || 0;
                const remaining = Math.max(0, capacity - registered);
                const percentFull = (registered / capacity) * 100;
                const statusInfo = getEventStatus(event);

                let barClass = '';
                if (percentFull >= 100) barClass = 'full';
                else if (percentFull >= 80) barClass = 'almost-full';

                return `
                    <div class="glass-card registration-card">
                        <div class="status-indicator ${statusInfo.color}"></div>
                        
                        <h3>${event.title}</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem; margin: 10px 0;">
                            ðŸ“… ${new Date(event.date).toLocaleDateString()} at ${event.time}
                        </p>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">
                            ðŸ“ ${event.location}
                        </p>

                        <span class="event-status-badge ${statusInfo.status}">${statusInfo.label}</span>

                        <div class="capacity-bar">
                            <div class="capacity-fill ${barClass}" style="width: ${Math.min(percentFull, 100)}%"></div>
                        </div>

                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="stat-value">${capacity}</div>
                                <div class="stat-label">Total Capacity</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" style="color: ${registered > 0 ? '#2ecc71' : '#95a5a6'}">${registered}</div>
                                <div class="stat-label">Registered</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" style="color: ${remaining > 0 ? '#3498db' : '#e74c3c'}">${remaining}</div>
                                <div class="stat-label">Remaining</div>
                            </div>
                        </div>

                        <button onclick="viewEventDetails('${event._id}')" class="btn btn-outline" style="width: 100%; margin-top: 20px;">
                            View Details
                        </button>
                    </div>
                `;
            }).join('');
        }

        function viewEventDetails(id) {
            window.location.href = `event-details.html?id=${id}`;
        }

        loadRegistrations();
    </script>
</body>

</html>
