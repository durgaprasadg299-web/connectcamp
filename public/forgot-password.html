<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Campus Connect Lite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #0a0e27, #1a1f3a, #2d1b4e, #1e3a5f);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        /* Particle System */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Enhanced Auth Container */
        .auth-container {
            animation: fadeIn 0.8s ease-out;
        }

        .auth-box {
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .auth-box h2 {
            animation: slideInRight 0.6s ease-out 0.3s backwards;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            animation: slideInRight 0.6s ease-out backwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.4s;
        }

        .form-control {
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .btn {
            animation: slideInRight 0.6s ease-out 0.5s backwards;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .auth-box p {
            animation: fadeIn 0.6s ease-out 0.6s backwards;
        }

        .form-info {
            animation: slideInRight 0.6s ease-out 0.35s backwards;
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            animation: slideInRight 0.6s ease-out 0.3s backwards;
        }

        .alert-success {
            background-color: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .alert-error {
            background-color: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }
    </style>
</head>

<body>
    <!-- Particle Background -->
    <div class="particles-container" id="particles"></div>

    <header>
        <div class="container">
            <nav>
                <div class="logo"><a href="index.html" style="text-decoration:none; color:var(--primary-color)">Campus
                        Connect Lite</a></div>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <div class="glass-card auth-box">
            <h2 style="margin-bottom: 10px;">Forgot Password</h2>
            <p class="form-info">Enter your email address and we'll send you a link to reset your password.</p>

            <div id="messageContainer"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;" id="submitBtn">Send Reset Link</button>
            </form>

            <p style="margin-top: 15px; color: var(--text-muted); text-align: center;">
                Remember your password? <a href="login.html" style="color: var(--primary-color);">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Generate Particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;

                container.appendChild(particle);
            }
        }

        createParticles();

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageContainer = document.getElementById('messageContainer');

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';

                const data = await fetchAPI('/auth/forgot-password', 'POST', { email });

                messageContainer.innerHTML = `
                    <div class="alert alert-success">
                        âœ“ Password reset link has been sent to <strong>${email}</strong><br>
                        <small>Check your email and follow the link to reset your password. The link will expire in 1 hour.</small>
                    </div>
                `;

                // Clear form
                document.getElementById('forgotPasswordForm').reset();

                // Disable the form for 5 seconds
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Reset Link';
                }, 5000);
            } catch (error) {
                messageContainer.innerHTML = `
                    <div class="alert alert-error">
                        âœ— ${error.message || 'Error sending reset link'}
                    </div>
                `;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
